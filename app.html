const FamilyDB = {
  _mKey: 'family_months',
  _txKey: 'family_tx',
  _catKey: 'family_categories',

  getMonthData(m){ try{ return (JSON.parse(localStorage.getItem(this._mKey)||'{}'))[m]||{}; }catch{ return {}; } },
  saveMonthData(m, data){
    const all = JSON.parse(localStorage.getItem(this._mKey)||'{}');
    all[m] = data;
    localStorage.setItem(this._mKey, JSON.stringify(all));
  },
  getTxs(m){
    try{
      return JSON.parse(localStorage.getItem(this._txKey)||'[]').filter(t=>t.date.startsWith(m));
    }catch{ return []; }
  },
  addTx(tx){
    const txs = JSON.parse(localStorage.getItem(this._txKey)||'[]');
    txs.push(tx);
    localStorage.setItem(this._txKey, JSON.stringify(txs));
  },
  deleteTx(id){
    const txs = JSON.parse(localStorage.getItem(this._txKey)||'[]').filter(t=>t.id!==id);
    localStorage.setItem(this._txKey, JSON.stringify(txs));
  },
  getCategories(){
    try{
      const saved = JSON.parse(localStorage.getItem(this._catKey)||'null');
      if(saved){
        const savingIds = new Set(['fam_emergency','fam_qurban']);
        const nonSavingIds = new Set(['fam_liquid','fam_pajak']);
        let dirty = false;
        saved.forEach(c => {
          if(savingIds.has(c.id) && c.type !== 'saving'){ c.type = 'saving'; dirty = true; }
          if(nonSavingIds.has(c.id) && c.type === 'saving'){ delete c.type; dirty = true; }
        });
        if(dirty) localStorage.setItem(this._catKey, JSON.stringify(saved));
        return saved;
      }
    }catch{}
    const defaults = [
      { id:'fam_liquid',   name:'Liquid',    lucide:'droplets',        color:'#2563eb', bg:'#dbeafe' },
      { id:'fam_emergency',name:'Emergency', lucide:'shield',          color:'#dc2626', bg:'#fee2e2', type:'saving' },
      { id:'fam_qurban',   name:'Qurban',    lucide:'heart',           color:'#d97706', bg:'#fef3c7', type:'saving' },
      { id:'fam_pajak',    name:'Pajak',     lucide:'landmark',        color:'#6366f1', bg:'#e0e7ff' },
      { id:'fam_listrik',  name:'Listrik',   lucide:'zap',             color:'#ea580c', bg:'#ffedd5' },
      { id:'fam_gas',      name:'Gas',       lucide:'flame',           color:'#f59e0b', bg:'#fef9c3' },
      { id:'fam_tehima',   name:'Teh Ima',   lucide:'user',            color:'#db2777', bg:'#fce7f3' },
      { id:'fam_sampah',   name:'Sampah',    lucide:'trash-2',         color:'#9ca3af', bg:'#f3f4f6' },
      { id:'fam_internet', name:'Internet',  lucide:'wifi',            color:'#0d9488', bg:'#ccfbf1' },
    ];
    localStorage.setItem(this._catKey, JSON.stringify(defaults));
    return defaults;
  },
  saveCategories(cats){ localStorage.setItem(this._catKey, JSON.stringify(cats)); },
  getAllocations(m){ return this.getMonthData(m).allocations || {}; },
  saveAllocations(m, allocs){
    const d = this.getMonthData(m);
    this.saveMonthData(m, {...d, allocations: allocs});
  },

  // Pull income from emir's 'family' type category allocations
  getIncomeFromEmir(m){
    try{
      const emirMonths = JSON.parse(localStorage.getItem('emir_months')||'{}');
      const emirCats   = JSON.parse(localStorage.getItem('emir_categories')||'[]');
      const famCatIds  = new Set(emirCats.filter(c=>c.type==='family').map(c=>c.id));
      if(!famCatIds.size) return { total: 0, sources: [] };
      const md = emirMonths[m];
      if(!md?.incomes) return { total: 0, sources: [] };
      let total = 0;
      const sources = [];
      md.incomes.forEach(inc => {
        const contrib = Object.entries(inc.allocations||{})
          .filter(([k])=>famCatIds.has(k))
          .reduce((s,[,v])=>s+(v||0), 0);
        if(contrib > 0){ total += contrib; sources.push({ label: inc.label, amount: contrib }); }
      });
      return { total, sources };
    }catch{ return { total: 0, sources: [] }; }
  },
};

const FamilyState = { subtab: 'ringkasan' };

const FamilyApp = {
  render(){
    const m = State.month;
    const { total: income, sources } = FamilyDB.getIncomeFromEmir(m);
    const allocs = FamilyDB.getAllocations(m);
    const txs = FamilyDB.getTxs(m);
    const cats = FamilyDB.getCategories();
    const totalAlloc = Object.values(allocs).reduce((s,v)=>s+(v||0), 0);
    const totalSpent = txs.reduce((s,t)=>s+t.amount, 0);
    const sisa = income - totalSpent;

    const emirFamCats = (() => {
      try{ return JSON.parse(localStorage.getItem('emir_categories')||'[]').filter(c=>c.type==='family'); }catch{ return []; }
    })();

    let h = '';

    // Hero
    h += `<div class="fam-hero">
      <div class="fam-hero-label">Keluarga Kecil · ${mFull(m)}</div>
      <div class="fam-hero-val">${income ? fmtFull(income) : 'Belum ada kontribusi'}</div>
      <div class="fam-hero-sub">${income ? `Sisa ${fmtRp(sisa)} · Terpakai ${fmtRp(totalSpent)}` : 'Tandai kategori sebagai "Keluarga" di tab Pemasukan'}</div>
    </div>`;

    // No family category configured yet
    if(!emirFamCats.length){
      h += `<div class="section-flat" style="padding:24px 20px;text-align:center;">
        ${icon('house-heart',40,'var(--text-faint)')}
        <div style="font-size:14px;font-weight:600;color:var(--text);margin-top:12px;">Belum ada kategori keluarga</div>
        <div style="font-size:13px;color:var(--text-muted);margin-top:6px;line-height:1.6;">Buat kategori baru di tab Pemasukan dan centang <b>"Kontribusi Keluarga"</b> agar alokasinya masuk ke sini.</div>
      </div>`;
      return h;
    }

    // Sub-tabs
    h += `<div class="fam-subtabs">
      <button class="fam-subtab${FamilyState.subtab==='ringkasan'?' active':''}" onclick="FamilyApp.setSubtab('ringkasan')">Ringkasan</button>
      <button class="fam-subtab${FamilyState.subtab==='transaksi'?' active':''}" onclick="FamilyApp.setSubtab('transaksi')">Transaksi</button>
      <button class="fam-subtab${FamilyState.subtab==='alokasi'?' active':''}" onclick="FamilyApp.setSubtab('alokasi')">Alokasi</button>
    </div>`;

    if(FamilyState.subtab === 'ringkasan') h += this._renderRingkasan(m, income, txs, allocs, cats, sisa, totalSpent, sources);
    else if(FamilyState.subtab === 'transaksi') h += this._renderTransaksi(m, txs, cats);
    else h += this._renderAlokasi(m, income, allocs, cats, totalAlloc);

    return h;
  },

  // ── Public wrappers (called by Render.* when State.view==='keluarga') ──

  renderRingkasan(){
    const m = State.month;
    const { total: income, sources } = FamilyDB.getIncomeFromEmir(m);
    const allocs = FamilyDB.getAllocations(m);
    const cats = FamilyDB.getCategories();
    const txs = FamilyDB.getTxs(m);
    const spendCats = cats.filter(c => c.type !== 'saving');

    // All-time data for saldo tersedia calculation
    const allFamMonths = (() => { try { return JSON.parse(localStorage.getItem('family_months')||'{}'); } catch { return {}; } })();
    const allFamTxs    = (() => { try { return JSON.parse(localStorage.getItem('family_tx')||'[]'); } catch { return []; } })();

    // payDay helper: given a month key, determine the effective payDate
    const getFamPayDate = (mo) => {
      let payDay = 1;
      try {
        const emirMonths = JSON.parse(localStorage.getItem('emir_months')||'{}');
        const emirCats   = JSON.parse(localStorage.getItem('emir_categories')||'[]');
        const famCatIds  = new Set(emirCats.filter(c=>c.type==='family').map(c=>c.id));
        const md = emirMonths[mo];
        if(md?.incomes){
          md.incomes.forEach(inc => {
            const contrib = Object.entries(inc.allocations||{}).filter(([k])=>famCatIds.has(k)).reduce((s,[,v])=>s+(v||0),0);
            if(contrib > 0 && (inc.payDay||1) > payDay) payDay = inc.payDay||1;
          });
        }
      } catch(e){}
      return mo + '-' + String(payDay).padStart(2,'0');
    };

    // Sisa = sum of all saldo tersedia across all spending categories (only realized allocs)
    const totalSisa = spendCats.reduce((sum, cat) => {
      const totalAllocEver = Object.entries(allFamMonths).reduce((s,[mo,md])=>{
        const payDate = getFamPayDate(mo);
        if(payDate > today()) return s;
        return s + ((md.allocations||{})[cat.id]||0);
      }, 0);
      const totalSpentEver = allFamTxs.filter(t=>t.cat===cat.id).reduce((s,t)=>s+t.amount, 0);
      return sum + (cat.initialBalance||0) + totalAllocEver - totalSpentEver;
    }, 0);

    // totalSpent this month (for display on hero stats)
    const totalSpent = txs.filter(t=>{ const c=cats.find(x=>x.id===t.cat); return c?.type!=='saving'; }).reduce((s,t)=>s+t.amount, 0);

    return this._renderRingkasan(m, income, txs, allocs, cats, totalSisa, totalSpent, sources);
  },

  renderTransaksi(){
    const m = State.month;
    const txs = FamilyDB.getTxs(m);
    const cats = FamilyDB.getCategories();
    return this._renderTransaksi(m, txs, cats);
  },

  renderTabungan(){
    const cats = FamilyDB.getCategories().filter(c => c.type === 'saving');
    if(!cats.length){
      return `<div class="empty">${icon('piggy-bank',40,'var(--text-faint)')}<div class="empty-label">Belum ada kantong tabungan</div><div class="empty-sub">Tandai kategori sebagai "saving" untuk melihatnya di sini.</div></div>`;
    }

    const allFamMonths = (() => { try { return JSON.parse(localStorage.getItem('family_months')||'{}'); } catch { return {}; } })();
    const allMonths = Object.keys(allFamMonths).sort();
    const allFamTxs = (() => { try { return JSON.parse(localStorage.getItem('family_tx')||'[]'); } catch { return []; } })();

    let h = '';
    cats.forEach(cat => {
      const initialBalance = cat.initialBalance || 0;
      let totalIn = initialBalance, totalOut = 0;
      const history = [];

      if(initialBalance > 0){
        history.push({ date: '2000-01-01', label: 'Saldo awal', amount: initialBalance, type: 'in' });
      }

      allMonths.forEach(mo => {
        const allocs = (allFamMonths[mo]?.allocations) || {};
        const alloc = allocs[cat.id] || 0;
        if(alloc > 0){
          // payDay filter: check personal income sources for this month
          let payDay = 1;
          try {
            const emirMonths = JSON.parse(localStorage.getItem('emir_months')||'{}');
            const emirCats   = JSON.parse(localStorage.getItem('emir_categories')||'[]');
            const famCatIds  = new Set(emirCats.filter(c=>c.type==='family').map(c=>c.id));
            const md = emirMonths[mo];
            if(md?.incomes){
              md.incomes.forEach(inc => {
                const contrib = Object.values(Object.fromEntries(Object.entries(inc.allocations||{}).filter(([k])=>famCatIds.has(k)))).reduce((s,v)=>s+(v||0),0);
                if(contrib > 0 && (inc.payDay||1) > payDay) payDay = inc.payDay||1;
              });
            }
          } catch(e){}
          const payDate = mo + '-' + String(payDay).padStart(2,'0');
          if(payDate > today()) return; // not realized yet
          totalIn += alloc;
          history.push({ date: payDate, label: 'Alokasi · '+mo, amount: alloc, type: 'in' });
        }
      });

      allFamTxs.filter(t=>t.cat===cat.id).forEach(tx => {
        totalOut += tx.amount;
        history.push({ date: tx.date, label: tx.note||'Penarikan', amount: tx.amount, type: 'out' });
      });

      const balance = totalIn - totalOut;
      history.sort((a,b)=>b.date.localeCompare(a.date));
      const recent = history.slice(0, 5);

      h += `<div class="pocket-card">
        <div class="pocket-header">
          <div class="pocket-icon" style="background:${cat.bg};">${icon(cat.lucide,20,cat.color)}</div>
          <div>
            <div class="pocket-name">${cat.name}</div>
            <div class="pocket-sub">Saldo berjalan</div>
          </div>
        </div>
        <div class="pocket-balance" style="color:${balance<0?'var(--red)':cat.color}">${fmtRp(Math.abs(balance))}${balance<0?' <span style="font-size:14px;font-weight:600;color:var(--red)">defisit</span>':''}</div>
        <div class="pocket-stats">
          <div class="pocket-stat">
            <div class="pocket-stat-label">Total Masuk</div>
            <div class="pocket-stat-val" style="color:#16a34a;">${fmtRp(totalIn)}</div>
          </div>
          <div class="pocket-stat">
            <div class="pocket-stat-label">Total Keluar</div>
            <div class="pocket-stat-val" style="color:var(--red);">${fmtRp(totalOut)}</div>
          </div>
        </div>
        ${recent.length?`<div style="margin-top:16px;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;">Riwayat</div>
          ${recent.map(r=>`<div class="pocket-history-row">
            <div class="pocket-hist-dot" style="background:${r.type==='in'?'#16a34a':'var(--red)'}"></div>
            <div class="pocket-hist-info">
              <div class="pocket-hist-label">${r.label}</div>
              <div class="pocket-hist-date">${fmtDate(r.date)}</div>
            </div>
            <div class="pocket-hist-amt" style="color:${r.type==='in'?'#16a34a':'var(--red)'}">
              ${r.type==='in'?'+':'−'}${fmtRp(r.amount)}
            </div>
          </div>`).join('')}
        </div>`:''}
      </div>`;
    });
    return h;
  },

  renderAlokasi(){
    const m = State.month;
    const { total: income } = FamilyDB.getIncomeFromEmir(m);
    const allocs = FamilyDB.getAllocations(m);
    const cats = FamilyDB.getCategories(); // semua kategori termasuk saving bisa di-alokasi
    const totalAlloc = Object.values(allocs).reduce((s,v)=>s+(v||0), 0);
    return this._renderAlokasi(m, income, allocs, cats, totalAlloc);
  },

  _renderRingkasan(m, income, txs, allocs, cats, sisa, totalSpent, sources){
    const spendCats = cats.filter(c => c.type !== 'saving');
    const totalAvailable = sisa + totalSpent; // sisa here is totalSisa passed in
    const pct = totalAvailable > 0 ? Math.min(totalSpent / totalAvailable * 100, 100) : 0;
    const sisaColor = sisa < 0 ? '#fca5a5' : sisa < totalAvailable * .15 ? '#fde68a' : '#ffffff';

    // Hero card — same style as personal
    let h = `<div class="hero-card" style="background:linear-gradient(135deg,#059669 0%,#047857 100%);">
      <div class="hero-label">Sisa Budget Keluarga</div>
      <div class="hero-value" style="color:${sisaColor}">${fmtRp(Math.abs(sisa))}${sisa<0?' −':''}</div>
      <div class="hero-sub">${sisa<0?'Defisit':'Total saldo tersedia'} · ${mFull(m)}</div>
      <div class="hero-progress"><div class="hero-progress-fill" style="width:${pct}%;background:rgba(255,255,255,.5)"></div></div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hs-label">Pengeluaran</div>
          <div class="hs-val">${fmtRp(totalSpent)}</div>
        </div>
        <div class="hero-stat">
          <div class="hs-label">Kontribusi</div>
          <div class="hs-val">${fmtRp(income)}</div>
        </div>
      </div>
    </div>`;

    // Budget vs Aktual — allocs vs actual spending
    const allFamMonths = (() => { try { return JSON.parse(localStorage.getItem('family_months')||'{}'); } catch { return {}; } })();
    const allFamTxs    = (() => { try { return JSON.parse(localStorage.getItem('family_tx')||'[]'); } catch { return []; } })();
    const budgetCats = spendCats.filter(cat => {
      const b = allocs[cat.id]||0;
      const s = txs.filter(t=>t.cat===cat.id).reduce((a,t)=>a+t.amount,0);
      const hasInit = (cat.initialBalance||0) > 0;
      return b>0 || s>0 || hasInit;
    });
    if(budgetCats.length){
      h += `<div class="section-flat">
        <div class="section-header"><span class="card-title">Budget vs Aktual</span></div>
        <div style="padding:0 18px 16px;">`;
      budgetCats.forEach(cat => {
        const allocThisMonth = allocs[cat.id]||0;
        const s = txs.filter(t=>t.cat===cat.id).reduce((a,t)=>a+t.amount,0);
        // For cats with initialBalance, budget = saldo tersedia (initial + all allocs ever - all spending ever)
        const totalAllocEver = Object.values(allFamMonths).reduce((sum,md)=>sum+((md.allocations||{})[cat.id]||0),0);
        const totalSpentEver = allFamTxs.filter(t=>t.cat===cat.id).reduce((sum,t)=>sum+t.amount,0);
        const saldoTersedia = (cat.initialBalance||0) + totalAllocEver - totalSpentEver;
        const b = (cat.initialBalance||0) > 0 ? saldoTersedia : allocThisMonth;
        const label = (cat.initialBalance||0) > 0 ? 'saldo tersedia' : null;
        const pct = b>0 ? Math.min(s/b*100,100) : 0;
        const over = s>b && b>0;
        h += `<div class="budget-row">
          <div class="budget-top">
            <div style="width:38px;height:38px;border-radius:12px;background:${cat.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon(cat.lucide,16,cat.color)}</div>
            <div class="budget-info">
              <div class="budget-name">${cat.name}</div>
              <div class="budget-nums ${over?'over-text':''}">
                <span class="spent">${fmtFull(s)}</span>&nbsp;<span style="color:var(--text-faint)">/</span>&nbsp;${fmtRp(b)}${label?`<span style="font-size:10px;color:var(--text-muted);font-weight:500;"> ${label}</span>`:''}
              </div>
            </div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${over?'var(--red)':'var(--text-muted)'};">${b>0?Math.round(s/b*100):0}%</div>
          </div>
          <div class="budget-track">
            <div class="budget-fill" style="width:${pct}%;background:${over?'var(--red)':cat.color}"></div>
          </div>
        </div>`;
      });
      h += `</div></div>`;
    }

    // Recent txs
    const recent = [...txs].filter(t=>{ const c=cats.find(x=>x.id===t.cat); return c?.type!=='saving'; }).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
    h += `<div class="section-flat">
      <div class="section-header">
        <span class="card-title">Transaksi Terakhir</span>
        ${recent.length?`<button onclick="State.tab='transaksi';App.render()" style="background:none;border:none;color:#059669;font-size:13px;font-weight:600;cursor:pointer;">Lihat semua</button>`:''}
      </div>
      <div style="padding:0 18px;">`;
    if(!recent.length){
      h += `<div style="text-align:center;padding:20px 0;color:var(--text-faint);font-size:13px;">Belum ada transaksi bulan ini</div>`;
    } else {
      recent.forEach(tx => { h += this._txRow(tx, cats); });
    }
    h += `</div></div>`;

    return h;
  },

  _renderTransaksi(m, txs, cats){
    if(!txs.length) return `<div class="empty">${icon('receipt',40,'var(--text-faint)')}<div class="empty-label">Belum ada transaksi</div><div class="empty-sub">Tap + untuk tambah transaksi keluarga</div></div>`;
    const groups = {};
    [...txs].sort((a,b)=>b.date.localeCompare(a.date)).forEach(tx=>{
      if(!groups[tx.date]) groups[tx.date]=[];
      groups[tx.date].push(tx);
    });
    let h = '';
    Object.entries(groups).forEach(([date,items])=>{
      const dayTotal = items.reduce((s,t)=>s+t.amount,0);
      h += `<div class="tx-group">
        <div class="tx-group-header">
          <span class="tx-group-date">${fmtDate(date)}</span>
          <span class="tx-group-total">${fmtFull(dayTotal)}</span>
        </div>
        <div class="tx-group-items">`;
      items.forEach(tx => { h += this._txRow(tx, cats, true); });
      h += `</div></div>`;
    });
    return h;
  },

  _renderAlokasi(m, income, allocs, cats, totalAlloc){
    const diff = income - totalAlloc;
    const pct = income > 0 ? Math.min(totalAlloc / income * 100, 100) : 0;
    const remTxt = income > 0
      ? (diff > 0 ? `Sisa ${fmtRp(diff)}` : diff < 0 ? `Over ${fmtRp(Math.abs(diff))}` : 'Penuh ✓')
      : 'Set kontribusi terlebih dahulu';

    // Sticky income hero — same style as personal but green
    let h = `<div class="income-hero-sticky">
    <div class="income-hero" style="background:linear-gradient(135deg,#059669 0%,#047857 100%);">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;">
        <div class="income-hero-label">Kontribusi Keluarga · ${mFull(m)}</div>
      </div>
      <div class="income-hero-val">${income ? fmtFull(income) : 'Belum ada kontribusi'}</div>
      <div class="income-hero-sub">${remTxt}</div>
      <div class="income-hero-progress"><div class="income-hero-progress-fill" style="width:${pct}%"></div></div>
    </div>
    </div>

    <!-- Pie chart -->
    <div class="section-flat" style="margin-bottom:10px;">
      <div style="padding:18px 18px 14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
          <div style="font-size:15px;font-weight:700;letter-spacing:-.02em;">Komposisi Alokasi</div>
        </div>
        <div style="position:relative;width:220px;height:220px;margin:0 auto 14px;">
          <canvas id="famAllocChart"></canvas>
          <div id="famChartCenter" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-faint);">Total</div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:800;color:var(--text);text-align:center;line-height:1.3;">${fmtRp(totalAlloc)}</div>
          </div>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;">
          ${cats.filter(c=>(allocs[c.id]||0)>0).map(c=>`
            <div style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--text-muted);" class="fam-legend-item">
              <span class="fam-legend-dot" data-cat="${c.id}" style="width:7px;height:7px;border-radius:50%;background:${c.color};flex-shrink:0;display:inline-block;"></span>
              ${c.name}
            </div>`).join('')}
        </div>
      </div>
    </div>

    <!-- Alloc rows -->
    <div class="section-flat">
      <div class="section-header" style="padding-bottom:4px;">
        <div>
          <span class="card-title">Alokasi · Keluarga Kecil</span>
          ${income ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">${fmtFull(income)} · ${diff<0?`<span style="color:var(--red)">Over ${fmtRp(Math.abs(diff))}</span>`:diff===0&&totalAlloc>0?'<span style="color:#059669">Penuh ✓</span>':`Sisa ${fmtRp(diff)}`}</div>` : ''}
        </div>
      </div>
      <div style="padding:0 18px 8px;">`;

    // Only show cats included in allocs (same pattern as personal)
    const includedCats = cats.filter(c => c.id in allocs);
    const excludedCats = cats.filter(c => !(c.id in allocs));

    if(!includedCats.length){
      h += `<div style="text-align:center;padding:20px 0 12px;color:var(--text-faint);font-size:13px;">Belum ada pos alokasi.<br>Tap + untuk tambah.</div>`;
    }
    includedCats.forEach(cat => {
      const val = allocs[cat.id]||0;
      h += `<div class="alloc-row">
        <div style="width:36px;height:36px;border-radius:10px;background:${cat.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon(cat.lucide,15,cat.color)}</div>
        <span class="alloc-name">${cat.name}${cat.type==='saving'?` <span style="font-size:9px;font-weight:700;color:#059669;background:#dcfce7;border-radius:99px;padding:1px 6px;vertical-align:middle;">Tabungan</span>`:''}
        </span>
        <input class="alloc-field" type="number" inputmode="numeric" value="${val||''}" placeholder="0"
          data-famcat="${cat.id}" oninput="FamilyApp._liveTotal(${income})">
        <button class="alloc-act alloc-del" onclick="FamilyApp.removeAllocRow('${m}','${cat.id}')" title="Hapus dari alokasi">${icon('x',13,'currentColor')}</button>
      </div>`;
    });

    h += `<button class="add-cat-btn" onclick="FamilyApp.openAddAllocRow('${m}','${excludedCats.map(c=>c.id).join(',')}')">
        ${icon('plus-circle',16,'currentColor')} Tambah Pos Alokasi
      </button>
      <div class="alloc-total">
        <span>Total Alokasi</span>
        <span class="alloc-total-val ${diff<0?'over-budget':diff===0&&totalAlloc>0?'':''}" id="famAllocTotal">${fmtRp(totalAlloc)}</span>
      </div>
    </div>
    <div style="padding:0 18px 18px;display:flex;gap:8px;">
      <button class="btn btn-primary" style="background:#059669;flex:1;margin-top:0;" onclick="FamilyApp.saveAllocations('${m}')">Simpan Alokasi</button>
      <button onclick="FamilyApp.openAddCat()" title="Tambah kategori baru"
        style="flex-shrink:0;margin-top:0;border:none;border-radius:var(--radius-sm);padding:0 16px;background:#dcfce7;color:#059669;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;">
        ${icon('plus',16,'currentColor')}
      </button>
    </div></div>`;
    return h;
  },

  _txRow(tx, cats, inGroup=false){
    const cat = cats.find(c=>c.id===tx.cat) || cats[cats.length-1];
    return `<div class="tx-row">
      <div style="width:40px;height:40px;border-radius:12px;background:${cat.bg};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon(cat.lucide,16,cat.color)}</div>
      <div class="tx-info">
        <div class="tx-note">${tx.note||cat.name}</div>
        <div class="tx-meta">${inGroup?cat.name:fmtDate(tx.date)+' · '+cat.name}</div>
      </div>
      <div class="tx-amount">${fmtFull(tx.amount)}</div>
      <button class="tx-del" onclick="FamilyApp.deleteTx('${tx.id}')">${icon('trash-2',14,'currentColor')}</button>
    </div>`;
  },

  setSubtab(t){ FamilyState.subtab = t; App.render(); },

  _liveTotal(income){
    let total = 0;
    document.querySelectorAll('[data-famcat]').forEach(el=>{ total += parseInt(el.value||'0')||0; });
    const el = document.getElementById('famAllocTotal');
    if(el) el.textContent = fmtRp(total);
    updateFamAllocChart();
  },

  saveAllocations(m){
    const allocs = FamilyDB.getAllocations(m);
    document.querySelectorAll('[data-famcat]').forEach(el=>{
      const v = parseInt(el.value||'0')||0;
      if(v > 0) allocs[el.dataset.famcat] = v;
      else delete allocs[el.dataset.famcat];
    });
    FamilyDB.saveAllocations(m, allocs);
    App.render();
  },

  removeAllocRow(m, catId){
    const allocs = FamilyDB.getAllocations(m);
    delete allocs[catId];
    FamilyDB.saveAllocations(m, allocs);
    App.render();
  },

  openAddAllocRow(m, excludedIdsStr){
    const excludedIds = excludedIdsStr ? excludedIdsStr.split(',').filter(Boolean) : [];
    const cats = FamilyDB.getCategories().filter(c => excludedIds.includes(c.id));
    const rows = cats.map(c=>`
      <div style="display:flex;align-items:center;gap:6px;">
        <button class="add-alloc-pick-btn" onclick="FamilyApp._addAllocRow('${m}','${c.id}')" type="button" style="flex:1;">
          <span class="add-alloc-pick-dot" style="background:${c.color}"></span>
          ${c.name}
        </button>
        <button type="button" onclick="FamilyApp.openEditCat('${c.id}')"
          style="flex-shrink:0;width:36px;height:36px;border:1px solid var(--border);border-radius:10px;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);">
          ${icon('pencil',14,'currentColor')}
        </button>
      </div>`).join('');
    Modal.open(`
      <div class="modal-handle"></div>
      <div class="modal-title">Tambah Pos Alokasi</div>
      ${cats.length ? `<p style="font-size:13px;color:var(--text-muted);margin:-4px 0 16px;line-height:1.5;">Pilih kategori yang ingin ditambahkan ke alokasi keluarga.</p>
      <div class="add-alloc-pick-list">${rows}</div>
      <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:14px;">`
      :`<p style="font-size:13px;color:var(--text-muted);margin:-4px 0 16px;line-height:1.5;">Semua kategori sudah ada. Buat kategori baru untuk ditambahkan.</p><div>`}
        <button class="btn btn-secondary" onclick="FamilyApp.openAddCat();" type="button" style="width:100%;font-size:13px;">+ Buat kategori baru</button>
      </div>`);
  },

  _addAllocRow(m, catId){
    const allocs = FamilyDB.getAllocations(m);
    if(!(catId in allocs)) allocs[catId] = 0;
    FamilyDB.saveAllocations(m, allocs);
    Modal.close();
    App.render();
  },

  deleteTx(id){
    if(!confirm('Hapus transaksi ini?')) return;
    FamilyDB.deleteTx(id);
    App.render();
  },

  openAddTx(){
    const cats = FamilyDB.getCategories();
    const catOpts = cats.map(c=>`
      <button type="button" class="cat-option" data-famcat-pick="${c.id}" onclick="FamilyApp._pickCat('${c.id}',this)">
        ${icon(c.lucide,16,c.color)} ${c.name}
      </button>`).join('');
    Modal.open(`
      <div class="modal-handle"></div>
      <div class="modal-title">Transaksi Keluarga</div>
      <form onsubmit="FamilyApp.submitAddTx(event)">
        <div class="form-group">
          <label class="form-label">Nominal</label>
          <div class="form-amount-wrap">
            <span class="form-amount-prefix">Rp</span>
            <input class="form-input form-amount" id="famTxAmount" type="number" inputmode="numeric" placeholder="0" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Kategori</label>
          <div class="cat-grid">${catOpts}</div>
          <input type="hidden" id="famTxCat" required>
        </div>
        <div class="form-group">
          <label class="form-label">Catatan</label>
          <input class="form-input" id="famTxNote" type="text" placeholder="e.g. Alfamart, PLN...">
        </div>
        <div class="form-group">
          <label class="form-label">Tanggal</label>
          <input class="form-input" id="famTxDate" type="date" value="${today()}" required>
        </div>
        <button type="submit" class="btn btn-primary" style="background:#059669;">Simpan</button>
      </form>`);
  },

  _pickCat(id, el){
    document.querySelectorAll('[data-famcat-pick]').forEach(b=>{ b.classList.remove('selected'); b.style.background=''; b.style.color=''; });
    const cat = FamilyDB.getCategories().find(c=>c.id===id);
    el.classList.add('selected');
    if(cat){ el.style.background=cat.color; el.style.color='#fff'; }
    document.getElementById('famTxCat').value = id;
  },

  submitAddTx(e){
    e.preventDefault();
    const amount = parseInt(document.getElementById('famTxAmount').value||'0');
    const cat    = document.getElementById('famTxCat').value;
    const note   = document.getElementById('famTxNote').value.trim();
    const date   = document.getElementById('famTxDate').value;
    if(!amount || !cat) return;
    FamilyDB.addTx({ id:'ftx_'+Date.now(), amount, cat, note, date });
    Modal.close();
    App.render();
  },

  _catForm(cat){
    const iconGrid = CAT_ICONS.map((ic,i)=>{
      const active = cat ? ic.lucide===cat.lucide : i===0;
      return `<button type="button" class="icon-pick-btn${active?' active':''}" data-lucide-pick="${ic.lucide}" onclick="Modal._pickIcon('${ic.lucide}',this)">${icon(ic.lucide,18,'currentColor')}<span>${ic.label}</span></button>`;
    }).join('');
    const colorRow = CAT_COLORS.map((c,i)=>{
      const active = cat ? c.color===cat.color : i===0;
      return `<div class="color-pick-dot${active?' active':''}" data-color="${c.color}" data-bg="${c.bg}" style="background:${c.color}" onclick="Modal._pickColor('${c.color}','${c.bg}',this)"></div>`;
    }).join('');
    return { iconGrid, colorRow,
      initIcon: cat?.lucide || CAT_ICONS[0].lucide,
      initColor: cat?.color || CAT_COLORS[0].color,
      initBg: cat?.bg || CAT_COLORS[0].bg };
  },

  openAddCat(){
    const f = this._catForm(null);
    Modal.open(`
      <div class="modal-handle"></div>
      <div class="modal-title">Tambah Kategori Keluarga</div>
      <form onsubmit="FamilyApp.submitAddCat(event)">
        <div class="form-group"><label class="form-label">Nama</label>
          <input class="form-input" id="fcName" type="text" placeholder="e.g. Asuransi" required autofocus></div>
        <div class="form-group"><label class="form-label">Icon</label>
          <div class="icon-picker-grid">${f.iconGrid}</div>
          <input type="hidden" id="catIcon" value="${f.initIcon}"></div>
        <div class="form-group"><label class="form-label">Warna</label>
          <div class="color-pick-row">${f.colorRow}</div>
          <input type="hidden" id="catColor" value="${f.initColor}">
          <input type="hidden" id="catBg" value="${f.initBg}"></div>
        <button type="submit" class="btn btn-primary" style="background:#059669;">Tambah</button>
      </form>`);
  },
  submitAddCat(e){
    e.preventDefault();
    const name   = document.getElementById('fcName').value.trim();
    const lucide  = document.getElementById('catIcon')?.value || CAT_ICONS[0].lucide;
    const color   = document.getElementById('catColor')?.value || CAT_COLORS[0].color;
    const bg      = document.getElementById('catBg')?.value || CAT_COLORS[0].bg;
    if(!name) return;
    const cats = FamilyDB.getCategories();
    cats.push({ id:'fam_'+Date.now(), name, lucide, color, bg });
    FamilyDB.saveCategories(cats);
    Modal.close(); App.render();
  },

  openEditCat(id){
    const cats = FamilyDB.getCategories();
    const cat = cats.find(c=>c.id===id);
    if(!cat) return;
    const f = this._catForm(cat);
    Modal.open(`
      <div class="modal-handle"></div>
      <div class="modal-title">Edit Kategori</div>
      <form onsubmit="FamilyApp.submitEditCat(event,'${id}')">
        <div class="form-group"><label class="form-label">Nama</label>
          <input class="form-input" id="fcName" type="text" value="${cat.name}" required autofocus></div>
        <div class="form-group"><label class="form-label">Icon</label>
          <div class="icon-picker-grid">${f.iconGrid}</div>
          <input type="hidden" id="catIcon" value="${f.initIcon}"></div>
        <div class="form-group"><label class="form-label">Warna</label>
          <div class="color-pick-row">${f.colorRow}</div>
          <input type="hidden" id="catColor" value="${f.initColor}">
          <input type="hidden" id="catBg" value="${f.initBg}"></div>
        <div class="form-group"><label class="form-label">Saldo Awal (opsional)</label>
          <div class="form-amount-wrap"><span class="form-amount-prefix">Rp</span>
          <input class="form-input form-amount" id="fcInitBal" type="number" inputmode="numeric" value="${cat.initialBalance||''}" placeholder="0"></div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Saldo yang sudah ada sebelum mulai tracking</div>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button type="submit" class="btn btn-primary" style="background:#059669;flex:1;">Simpan</button>
          <button type="button" onclick="FamilyApp.deleteCat('${id}')"
            style="flex-shrink:0;border:none;border-radius:var(--radius-sm);padding:0 16px;background:#fee2e2;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;">Hapus</button>
        </div>
      </form>`);
  },
  submitEditCat(e, id){
    e.preventDefault();
    const name    = document.getElementById('fcName').value.trim();
    const lucide   = document.getElementById('catIcon')?.value;
    const color    = document.getElementById('catColor')?.value;
    const bg       = document.getElementById('catBg')?.value;
    const initBal  = parseInt(document.getElementById('fcInitBal')?.value||'0')||0;
    if(!name) return;
    const cats = FamilyDB.getCategories();
    const idx = cats.findIndex(c=>c.id===id);
    if(idx>=0) cats[idx] = { ...cats[idx], name, lucide, color, bg, ...(initBal?{initialBalance:initBal}:{}) };
    FamilyDB.saveCategories(cats);
    Modal.close(); App.render();
  },
  deleteCat(id){
    if(!confirm('Hapus kategori ini?')) return;
    const cats = FamilyDB.getCategories().filter(c=>c.id!==id);
    if(!cats.length){ alert('Minimal satu kategori.'); return; }
    FamilyDB.saveCategories(cats);
    Modal.close(); App.render();
  },
};

// ── Sync indicator ──────────────────────────────────────────────────
const SyncDot = {
  el(){ return document.getElementById('syncDot'); },
  ok()   { const e=this.el(); if(e){ e.className=''; e.style.background='#16a34a'; } },
  busy() { const e=this.el(); if(e){ e.className='syncing'; } },
  err()  { const e=this.el(); if(e){ e.className='error'; } },
};

// ── Sync Manager ────────────────────────────────────────────────────
const Sync = {
  _familyId: null,
  _userId: null,
  _timer: null,
  _dirty: new Set(),

  // Keys owned by personal vs family
  _personalKeys: ['emir_months','emir_categories','emir_tx'],
  _familyKeys:   ['family_months','family_categories','family_tx'],

  _lsSet: null, // original localStorage.setItem, saved before proxy

  // Install localStorage proxy — called once after auth
  installProxy(){
    this._lsSet = localStorage.setItem.bind(localStorage);
    localStorage.setItem = (key, value) => {
      this._lsSet(key, value);
      if(this._personalKeys.includes(key) || this._familyKeys.includes(key)){
        this._dirty.add(key);
        this._schedule();
      }
    };
  },

  _schedule(){
    SyncDot.busy();
    clearTimeout(this._timer);
    this._timer = setTimeout(()=>this._flush(), 1200);
  },

  async _flush(){
    try {
      // Personal data
      const personalDirty = [...this._dirty].some(k=>this._personalKeys.includes(k));
      if(personalDirty && this._userId){
        await _sb.from('user_data').upsert({
          user_id: this._userId,
          months:       JSON.parse(localStorage.getItem('emir_months')||'{}'),
          categories:   JSON.parse(localStorage.getItem('emir_categories')||'[]'),
          transactions: JSON.parse(localStorage.getItem('emir_tx')||'[]'),
          updated_at: new Date().toISOString(),
        }, { onConflict: 'user_id' });
      }
      // Family data
      const familyDirty = [...this._dirty].some(k=>this._familyKeys.includes(k));
      if(familyDirty && this._familyId){
        await _sb.from('family_data').upsert({
          family_id: this._familyId,
          months:       JSON.parse(localStorage.getItem('family_months')||'{}'),
          categories:   JSON.parse(localStorage.getItem('family_categories')||'[]'),
          transactions: JSON.parse(localStorage.getItem('family_tx')||'[]'),
          updated_at: new Date().toISOString(),
        }, { onConflict: 'family_id' });
      }
      this._dirty.clear();
      SyncDot.ok();
    } catch(e) {
      console.error('Sync error', e);
      SyncDot.err();
    }
  },

  // Load all cloud data into localStorage, then boot app
  async loadAndBoot(userId, familyId){
    this._userId = userId;
    this._familyId = familyId;

    try {
      // Load personal data
      const { data: ud } = await _sb.from('user_data').select('*').eq('user_id', userId).maybeSingle();
      if(ud){
        localStorage.setItem('emir_months',       JSON.stringify(ud.months       || {}));
        localStorage.setItem('emir_categories',   JSON.stringify(ud.categories   || []));
        localStorage.setItem('emir_tx',           JSON.stringify(ud.transactions || []));
      }
      // Load family data
      if(familyId){
        const { data: fd } = await _sb.from('family_data').select('*').eq('family_id', familyId).maybeSingle();
        if(fd){
          localStorage.setItem('family_months',     JSON.stringify(fd.months       || {}));
          localStorage.setItem('family_categories', JSON.stringify(fd.categories   || []));
          localStorage.setItem('family_tx',         JSON.stringify(fd.transactions || []));
        }
      }
    } catch(e){ console.warn('Load from cloud failed, using local data', e); }

    // Now install proxy so future writes sync back
    this.installProxy();
    // Subscribe to real-time family data changes from the other user
    if(familyId) this._subscribeFamily(familyId);
    SyncDot.ok();
  },

  _subscribeFamily(familyId){
    _sb.channel('family_data:' + familyId)
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'family_data',
        filter: `family_id=eq.${familyId}`,
      }, payload => {
        const fd = payload.new;
        if(!fd) return;
        // Write directly (bypass proxy so we don't echo back to Supabase)
        const set = this._lsSet || localStorage.setItem.bind(localStorage);
        set('family_months',     JSON.stringify(fd.months       || {}));
        set('family_categories', JSON.stringify(fd.categories   || []));
        set('family_tx',         JSON.stringify(fd.transactions || []));
        // Re-render so UI reflects remote change
        App.render();
      })
      .subscribe();
  },

  // Migrate existing localStorage data to cloud (first login only)
  async migrate(userId, familyId){
    const hasCloud = await _sb.from('user_data').select('user_id').eq('user_id', userId).maybeSingle();
    if(hasCloud.data) return false; // already migrated

    const months       = JSON.parse(localStorage.getItem('emir_months')||'{}');
    const categories   = JSON.parse(localStorage.getItem('emir_categories')||'[]');
    const transactions = JSON.parse(localStorage.getItem('emir_tx')||'[]');
    const hasLocal = Object.keys(months).length || categories.length || transactions.length;
    if(!hasLocal) return false;

    if(!confirm(`Ditemukan data lokal (${Object.keys(months).length} bulan, ${transactions.length} transaksi). Sync ke cloud sekarang?`)) return false;

    await _sb.from('user_data').insert({ user_id: userId, months, categories, transactions });
    if(familyId){
      const fm = JSON.parse(localStorage.getItem('family_months')||'{}');
      const fc = JSON.parse(localStorage.getItem('family_categories')||'[]');
      const ft = JSON.parse(localStorage.getItem('family_tx')||'[]');
      const hasFamLocal = Object.keys(fm).length || fc.length || ft.length;
      if(hasFamLocal){
        const famExists = await _sb.from('family_data').select('family_id').eq('family_id', familyId).maybeSingle();
        if(!famExists.data){
          await _sb.from('family_data').insert({ family_id: familyId, months: fm, categories: fc, transactions: ft });
        }
      }
    }
    return true;
  },
};

// ── Auth ────────────────────────────────────────────────────────────
const Auth = {
  _user: null,

  async init(){
    try {
      const { data: { session } } = await _sb.auth.getSession();
      if(session?.user) await this._onLogin(session.user);
      else this._showScreen();
    } catch(e) {
      console.error('Auth init error', e);
      this._showScreen();
    }
    _sb.auth.onAuthStateChange(async (event, session) => {
      if(event === 'SIGNED_IN' && session?.user) await this._onLogin(session.user);
      if(event === 'SIGNED_OUT') location.reload();
    });
  },

  async _onLogin(user){
    try {
      this._user = user;
      const name = user.user_metadata?.name || user.email?.split('@')[0] || '?';
      const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const av = document.getElementById('headerAvatar');
      if(av) av.textContent = initials;
      const familyId = await this._getFamilyId(user.id);
      await Sync.migrate(user.id, familyId);
      await Sync.loadAndBoot(user.id, familyId);
    } catch(e) {
      console.error('_onLogin error:', e);
    }
    document.getElementById('authScreen').classList.add('hidden');
    App.init();
  },

  async _getFamilyId(userId){
    const { data } = await _sb.from('family_members').select('family_id').eq('user_id', userId).maybeSingle();
    return data?.family_id || null;
  },

  _showScreen(){
    document.getElementById('authScreen').classList.remove('hidden');
  },

  showLogin(){
    document.getElementById('authErr').textContent = '';
  },

  async login(){
    const email = document.getElementById('authEmail').value.trim();
    const pass  = document.getElementById('authPassword').value;
    const btn   = document.getElementById('authLoginBtn');
    const err   = document.getElementById('authErr');
    if(!email||!pass){ err.textContent='Email dan password wajib diisi.'; return; }
    btn.disabled = true; btn.querySelector('span').textContent = 'Masuk...';
    const { error } = await _sb.auth.signInWithPassword({ email, password: pass });
    btn.disabled = false; btn.querySelector('span').textContent = 'Masuk';
    if(error) err.textContent = error.message === 'Invalid login credentials'
      ? 'Email atau password salah.' : error.message;
  },


  showMenu(){
    const user = this._user;
    const name = user?.user_metadata?.name || user?.email || 'Pengguna';
    if(confirm(`Login sebagai: ${name}\n\nKeluar dari akun?`)) this.logout();
  },

  async logout(){
    await _sb.auth.signOut();
  },
};

// ── Boot ─────────────────────────────────────────────────────────────
Auth.init();
</script>
