<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#7c6fff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Keuangan Emir">
<title>Keuangan Emir — FamFinance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface2: #f8f9fb;
  --border: #eef0f3;
  --divider: #f0f2f5;
  --text: #111827;
  --text-muted: #6b7280;
  --text-faint: #c4cad4;
  --blue: #2563eb;
  --blue-mid: #1d4ed8;
  --blue-light: #eff6ff;
  --blue-shadow: rgba(37,99,235,.18);
  --green: #16a34a;
  --red: #dc2626;
  --amber: #d97706;
  --radius: 18px;
  --radius-sm: 12px;
  --shadow: 0 1px 4px rgba(15,23,42,.06);
  --nav-h: 68px;
  --header-h: 58px;
  /* aliases for any legacy refs */
  --purple: #2563eb;
  --purple-light: #eff6ff;
}
html { height: 100%; }
body { min-height: 100%; overflow-y: auto; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app { display: flex; flex-direction: column; min-height: 100dvh; max-width: 480px; margin: 0 auto; }

/* ── Header ── */
.app-header {
  height: var(--header-h);
  background: var(--surface);
  box-shadow: 0 1px 0 var(--border);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 14px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 30;
}
.back-btn {
  display: flex; align-items: center; gap: 4px;
  color: var(--blue);
  text-decoration: none;
  font-size: 13px; font-weight: 600;
  padding: 6px 10px 6px 8px;
  border-radius: 99px;
  background: var(--blue-light);
  white-space: nowrap;
  width: fit-content;
  transition: opacity .15s;
}
.back-btn:active { opacity: .7; }
.back-btn svg { flex-shrink: 0; }
.month-nav {
  display: flex; align-items: center; gap: 2px;
  background: var(--surface2);
  border-radius: 12px;
  padding: 3px;
}
.month-btn {
  background: none; border: none;
  color: var(--text-muted);
  cursor: pointer;
  width: 30px; height: 30px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
  flex-shrink: 0;
}
.month-btn:active { background: var(--border); color: var(--text); }
.month-label {
  font-weight: 700; font-size: 14px;
  min-width: 96px; text-align: center;
  letter-spacing: -.02em; color: var(--text);
}
.header-right {
  display: flex; justify-content: flex-end; align-items: center;
}
.header-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--blue), #60a5fa);
  color: #fff;
  font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  cursor: pointer;
  box-shadow: 0 2px 6px var(--blue-shadow);
}

/* ── Main ── */
.app-main {
  flex: 1;
  padding: 16px 16px 20px;
}

/* ── Bottom Nav ── */
.bottom-nav {
  height: var(--nav-h);
  background: var(--surface);
  border-top: none;
  box-shadow: 0 -1px 0 var(--border), 0 -4px 16px rgba(15,23,42,.04);
  display: flex;
  align-items: center;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
  position: sticky;
  bottom: 0;
  z-index: 20;
}
.nav-btn {
  flex: 1; background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  padding: 10px 0 6px;
  color: var(--text-faint);
  font-size: 10px; font-weight: 600;
  letter-spacing: .01em;
  transition: color .15s;
  position: relative;
}
.nav-btn.active { color: var(--blue); }
.nav-btn.active .nav-icon {
  background: var(--blue-light);
  border-radius: 10px;
}
.nav-icon {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 28px;
  border-radius: 10px;
  transition: background .15s;
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + 18px);
  right: max(18px, calc(50% - 222px));
  width: 54px; height: 54px;
  border-radius: 17px;
  background: linear-gradient(135deg, var(--blue), var(--blue-mid));
  color: #fff;
  border: none; cursor: pointer;
  box-shadow: 0 6px 22px var(--blue-shadow), 0 2px 6px rgba(0,0,0,.1);
  display: flex; align-items: center; justify-content: center;
  z-index: 20;
  transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s;
}
.fab:active { transform: scale(.91); box-shadow: 0 2px 8px var(--blue-shadow); }

/* ── Hero card ── */
.hero-card {
  background: linear-gradient(145deg, #2563eb 0%, #1a4fd0 55%, #1e40af 100%);
  border-radius: var(--radius);
  padding: 24px 22px 20px;
  margin-bottom: 14px;
  color: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: 0 6px 20px rgba(37,99,235,.28), 0 1px 4px rgba(37,99,235,.12);
}
.hero-card::before {
  content: '';
  position: absolute; right: -30px; top: -30px;
  width: 150px; height: 150px;
  border-radius: 50%;
  background: rgba(255,255,255,.08);
  pointer-events: none;
}
.hero-card::after {
  content: '';
  position: absolute; right: 40px; bottom: -40px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(255,255,255,.05);
  pointer-events: none;
}
.hero-label {
  font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .09em;
  opacity: .65; margin-bottom: 8px;
}
.hero-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 38px; font-weight: 800; line-height: 1;
  letter-spacing: -.03em;
}
.hero-sub { font-size: 12px; opacity: .65; margin-top: 7px; font-weight: 500; }
.hero-progress {
  height: 4px; background: rgba(255,255,255,.18);
  border-radius: 99px; margin-top: 16px; overflow: hidden;
}
.hero-progress-fill { height: 100%; border-radius: 99px; background: rgba(255,255,255,.75); transition: width .6s cubic-bezier(.4,0,.2,1); }
.hero-stats {
  display: flex; margin-top: 16px;
  border-top: 1px solid rgba(255,255,255,.14); padding-top: 16px;
}
.hero-stat { flex: 1; }
.hero-stat + .hero-stat { border-left: 1px solid rgba(255,255,255,.14); padding-left: 18px; }
.hs-label { font-size: 10px; opacity: .55; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
.hs-val { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }

/* ── Card ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-bottom: 10px;
}
/* Flat section — no shadow, just background */
.section-flat {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 10px;
}
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 18px 12px;
}
.card-title {
  font-size: 15px; font-weight: 700;
  letter-spacing: -.02em;
  color: var(--text);
  margin-bottom: 0;
}

/* ── Category icon box ── */
.cat-box {
  width: 42px; height: 42px;
  border-radius: 13px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.cat-box svg { stroke-width: 1.8; }

/* ── Budget rows ── */
.budget-row { margin-bottom: 16px; }
.budget-row:last-child { margin-bottom: 0; }
.budget-top {
  display: flex; align-items: center; gap: 13px; margin-bottom: 10px;
}
.budget-info { flex: 1; }
.budget-name { font-size: 14px; font-weight: 600; color: var(--text); }
.budget-nums {
  font-size: 11px; color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  display: flex; gap: 3px; align-items: baseline; margin-top: 2px;
}
.budget-nums .spent { font-size: 14px; font-weight: 700; color: var(--text); }
.budget-track { height: 5px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.budget-fill { height: 100%; border-radius: 99px; transition: width .5s cubic-bezier(.4,0,.2,1); }
.over-text { color: var(--red) !important; }

/* ── Transaction rows ── */
.tx-row {
  display: flex; align-items: center; gap: 13px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.tx-row:last-child { border-bottom: none; }
.tx-info { flex: 1; min-width: 0; }
.tx-note { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.tx-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }
.tx-amount { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: var(--red); white-space: nowrap; }
.tx-del {
  background: none; border: none;
  color: var(--text-faint);
  cursor: pointer; padding: 6px;
  border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s;
}
.tx-del:active { background: #fee2e2; color: var(--red); }

/* ── Full tx list ── */
.tx-group { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 10px; }
.tx-group-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 18px;
  background: var(--surface2);
}
.tx-group-date { font-size: 12px; font-weight: 700; letter-spacing: .01em; color: var(--text-muted); }
.tx-group-total { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--red); }
.tx-group-items { padding: 0 18px; }

/* ── Empty ── */
.empty { text-align: center; padding: 52px 20px; color: var(--text-muted); }
.empty svg { opacity: .25; margin-bottom: 12px; }
.empty-label { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
.empty-sub { font-size: 12px; color: var(--text-faint); }

/* ── Summary rows ── */
.summary-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.summary-row:last-child { border-bottom: none; }
.summary-row .lbl { color: var(--text-muted); font-weight: 500; }
.summary-row .val { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

/* ── Income hero ── */
.income-hero {
  border-radius: var(--radius);
  padding: 24px 22px 20px;
  color: #fff;
  margin-bottom: 14px;
  position: relative; overflow: hidden;
  transition: background .35s ease, box-shadow .35s ease;
}
.income-hero[data-color="0"] { background: linear-gradient(145deg, #2563eb 0%, #1a4fd0 55%, #1e40af 100%); box-shadow: 0 8px 28px rgba(37,99,235,.30), 0 2px 8px rgba(37,99,235,.16); }
.income-hero[data-color="1"] { background: linear-gradient(145deg, #7c3aed 0%, #6d28d9 55%, #5b21b6 100%); box-shadow: 0 8px 28px rgba(124,58,237,.30), 0 2px 8px rgba(124,58,237,.16); }
.income-hero::before {
  content: '';
  position: absolute; right: -24px; top: -24px;
  width: 130px; height: 130px; border-radius: 50%;
  background: rgba(255,255,255,.08);
  pointer-events: none;
}
.income-hero::after {
  content: '';
  position: absolute; left: -20px; bottom: -30px;
  width: 90px; height: 90px; border-radius: 50%;
  background: rgba(255,255,255,.05);
  pointer-events: none;
}
.income-hero { cursor: grab; user-select: none; touch-action: pan-y; }
.income-hero-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .09em; opacity: .65; margin-bottom: 7px; }
.income-hero-val { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 800; letter-spacing: -.03em; }
.income-hero-sub { font-size: 12px; opacity: .65; margin-top: 6px; font-weight: 500; }
.income-hero-progress { height: 3px; background: rgba(255,255,255,.2); border-radius: 4px; overflow: hidden; margin-top: 14px; }
.income-hero-progress-fill { height: 100%; border-radius: 4px; background: #fff; transition: width .4s; }
/* swipe hint arrow */
.income-hero-swipe-hint { position: absolute; right: 18px; bottom: 18px; display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; opacity: .5; }
/* dot indicator */
.income-dots { display: flex; align-items: center; justify-content: center; gap: 6px; margin: -6px 0 12px; }
.income-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); transition: all .2s; cursor: pointer; }
.income-dot.active { width: 18px; border-radius: 3px; background: var(--blue); }
/* sticky hero wrapper */
.income-hero-sticky {
  position: sticky;
  top: var(--header-h);
  z-index: 20;
  background: var(--bg);
  margin: -16px -16px 0;
  padding: 12px 0 8px;
}
/* carousel track */
.income-hero-track {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  gap: 12px;
  padding: 0 16px;
  padding-right: 48px; /* peek next card */
}
.income-hero-track::-webkit-scrollbar { display: none; }
.income-hero {
  scroll-snap-align: start;
  flex: 0 0 calc(100% - 32px); /* full width minus padding, peek right */
  min-width: 0;
}
/* slide animation — keep for dot click */
.income-hero.slide-left  { animation: slideInLeft  .28s cubic-bezier(.25,1,.5,1) both; }
.income-hero.slide-right { animation: slideInRight .28s cubic-bezier(.25,1,.5,1) both; }
@keyframes slideInLeft  { from { opacity:0; transform:translateX(32px) scale(.97); } to { opacity:1; transform:none; } }
@keyframes slideInRight { from { opacity:0; transform:translateX(-32px) scale(.97); } to { opacity:1; transform:none; } }

/* ── Alloc rows ── */
.alloc-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
}
.alloc-row:last-child { border-bottom: none; }
.alloc-name { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
.alloc-field {
  width: 106px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700;
  text-align: right; color: var(--text);
  outline: none; -webkit-appearance: none; appearance: none;
}
.alloc-field:focus { border-color: var(--blue); background: #fff; }
.alloc-total {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 0 0;
  border-top: 2px solid var(--border); margin-top: 6px;
  font-size: 14px; font-weight: 700;
}
.alloc-total-val { font-family: 'JetBrains Mono', monospace; font-size: 17px; font-weight: 800; }
.over-budget { color: var(--red); }
.under-budget { color: var(--green); }

/* ── Buttons ── */
.btn {
  width: 100%; border: none;
  border-radius: var(--radius-sm);
  padding: 16px; margin-top: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 700;
  cursor: pointer; letter-spacing: -.01em;
}
.btn-primary {
  background: linear-gradient(135deg, var(--blue), var(--blue-mid));
  color: #fff;
  box-shadow: 0 4px 14px var(--blue-shadow);
}
.btn-primary:active { opacity: .88; transform: scale(.98); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,14,26,.5);
  z-index: 100; display: none;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(5px);
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  background: var(--surface);
  border-radius: 26px 26px 0 0;
  width: 100%; max-width: 480px;
  padding: 0 20px calc(env(safe-area-inset-bottom, 16px) + 20px);
  max-height: 92dvh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,0,.67,0);
  box-shadow: 0 -4px 40px rgba(15,23,42,.14);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); transition-timing-function: cubic-bezier(.33,1,.68,1); }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 14px auto 22px; }
.modal-title { font-size: 19px; font-weight: 800; margin-bottom: 22px; letter-spacing: -.03em; }

/* ── Form ── */
.form-group { margin-bottom: 18px; }
.form-label {
  font-size: 12px; font-weight: 700;
  color: var(--text-muted);
  letter-spacing: .01em; display: block; margin-bottom: 8px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 13px 15px;
  font-family: 'Inter', sans-serif;
  font-size: 15px; color: var(--text);
  outline: none;
  transition: border-color .15s, background .15s, box-shadow .15s;
  -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--blue); background: #fff;
  box-shadow: 0 0 0 3px var(--blue-light);
}
.form-amount-wrap { position: relative; }
.form-amount-prefix {
  position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600;
  color: var(--text-muted); pointer-events: none;
}
.form-amount {
  font-family: 'JetBrains Mono', monospace !important;
  font-size: 26px !important; font-weight: 700 !important;
  padding-left: 48px !important; padding-top: 14px !important; padding-bottom: 14px !important;
}
.form-textarea { resize: none; height: 76px; }

/* ── Category selector ── */
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-option {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  font-size: 13px; font-weight: 600; color: var(--text-muted);
  transition: all .15s;
}
.cat-option svg { flex-shrink: 0; stroke-width: 2; }
.cat-option.selected { border-color: transparent; color: #fff; }

/* ── Segmented control ── */
.seg-btn {
  border: none; background: none; cursor: pointer;
  padding: 6px 14px; border-radius: 99px;
  font-size: 12px; font-weight: 600; color: var(--text-muted);
  transition: all .15s;
  white-space: nowrap;
}
.seg-active {
  background: var(--surface);
  color: var(--blue);
  box-shadow: 0 1px 4px rgba(15,23,42,.10);
}

/* ── Icon picker grid ── */
.icon-picker-grid {
  display: grid; grid-template-columns: repeat(5,1fr); gap: 6px;
}
.icon-pick-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 4px 8px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--border);
  background: var(--surface2);
  cursor: pointer;
  font-size: 9px; font-weight: 600; color: var(--text-muted);
  transition: all .12s;
  line-height: 1;
}
.icon-pick-btn.active {
  border-color: var(--blue);
  background: var(--blue-light);
  color: var(--blue);
}
/* ── Color picker row ── */
.color-pick-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0; }
.color-pick-dot {
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; border: 2.5px solid transparent;
  transition: transform .12s, border-color .12s;
  flex-shrink: 0;
}
.color-pick-dot.active { border-color: var(--text); transform: scale(1.15); }

/* ── Alloc action btns ── */
.alloc-act {
  background: none; border: none; cursor: pointer;
  color: var(--text-faint);
  width: 26px; height: 26px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: color .12s, background .12s;
}
.alloc-act:hover { color: var(--blue); background: var(--blue-light); }
.alloc-del:hover { color: var(--red) !important; background: #fee2e2 !important; }
/* ── Add category btn ── */
.add-cat-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%;
  padding: 12px 4px;
  background: none; border: none;
  border-top: none;
  margin-top: 0;
  color: var(--blue);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  transition: opacity .12s;
}
.add-cat-btn:hover { opacity: .8; }
.add-alloc-pick-list { display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; }
.add-alloc-pick-btn { display:flex; align-items:center; gap:10px; width:100%; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:12px; font-size:14px; font-weight:500; color:var(--text-primary); text-align:left; cursor:pointer; transition:background .15s; }
.add-alloc-pick-btn:hover { background:var(--bg); }
.add-alloc-pick-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

/* ── View toggle (Personal / Keluarga) ── */
.view-toggle { display:flex; background:var(--surface); border-radius:10px; padding:3px; gap:2px; margin-bottom:14px; box-shadow:var(--shadow); }
.view-toggle-btn { flex:1; padding:8px 4px; border:none; background:none; border-radius:8px; font-size:12px; font-weight:700; color:var(--text-muted); cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; gap:5px; }
.view-toggle-btn.active-personal { background:#ede9fe; color:#7c3aed; }
.view-toggle-btn.active-keluarga { background:#dcfce7; color:#059669; }

/* ── Keluarga tab ── */
.fam-hero {
  background: linear-gradient(145deg, #059669 0%, #047857 55%, #065f46 100%);
  border-radius: var(--radius);
  padding: 22px 20px 18px;
  color: #fff;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 8px 28px rgba(5,150,105,.28), 0 2px 8px rgba(5,150,105,.14);
}
.fam-hero::before { content:''; position:absolute; right:-20px; top:-20px; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,.08); }
.fam-hero-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.09em; opacity:.65; margin-bottom:6px; }
.fam-hero-val { font-family:'JetBrains Mono',monospace; font-size:30px; font-weight:800; letter-spacing:-.03em; }
.fam-hero-sub { font-size:12px; opacity:.7; margin-top:5px; }
.fam-subtabs { display:flex; background:var(--surface); border-radius:10px; padding:3px; gap:2px; margin-bottom:14px; box-shadow:var(--shadow); }
.fam-subtab { flex:1; padding:8px 4px; border:none; background:none; border-radius:8px; font-size:12px; font-weight:600; color:var(--text-muted); cursor:pointer; transition:all .15s; }
.fam-subtab.active { background:#dcfce7; color:#059669; }

/* ── Tabungan tab ── */
.pocket-card {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px 20px 18px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}
.pocket-card::before {
  content: '';
  position: absolute;
  right: -16px; top: -16px;
  width: 80px; height: 80px;
  border-radius: 50%;
  opacity: .07;
  background: currentColor;
}
.pocket-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.pocket-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.pocket-name { font-size: 15px; font-weight: 700; color: var(--text); }
.pocket-sub  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.pocket-balance { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 800; letter-spacing: -.03em; margin-bottom: 14px; }
.pocket-stats { display: flex; gap: 0; border-top: 1px solid var(--border); padding-top: 14px; }
.pocket-stat { flex: 1; }
.pocket-stat + .pocket-stat { border-left: 1px solid var(--border); padding-left: 14px; }
.pocket-stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.pocket-stat-val { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; }
.pocket-history-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.pocket-history-row:last-child { border-bottom: none; }
.pocket-hist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pocket-hist-info { flex: 1; min-width: 0; }
.pocket-hist-label { font-size: 13px; font-weight: 600; color: var(--text); }
.pocket-hist-date  { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.pocket-hist-amt   { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; }

/* ── Auth Screen ── */
#authScreen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 24px;
  font-family: 'Inter', sans-serif;
}
#authScreen.hidden { display: none; }
.auth-logo {
  width: 64px; height: 64px; border-radius: 20px;
  background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 8px 24px rgba(37,99,235,.3);
}
.auth-title { font-size: 22px; font-weight: 800; letter-spacing: -.03em; color: var(--text); margin-bottom: 4px; }
.auth-sub   { font-size: 13px; color: var(--text-muted); margin-bottom: 32px; }
.auth-card  {
  width: 100%; max-width: 360px;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  box-shadow: 0 4px 24px rgba(15,23,42,.08);
}
.auth-field { margin-bottom: 16px; }
.auth-field label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
.auth-field input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px; font-family: 'Inter', sans-serif;
  background: var(--surface);
  color: var(--text);
  outline: none; transition: border-color .15s;
}
.auth-field input:focus { border-color: var(--blue); }
.auth-btn {
  width: 100%; padding: 14px;
  background: var(--blue);
  color: #fff; border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: background .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.auth-btn:active { background: var(--blue-mid); }
.auth-btn:disabled { opacity: .6; cursor: not-allowed; }
.auth-err  { font-size: 13px; color: var(--red); text-align: center; margin-top: 12px; min-height: 20px; }
.auth-switch { text-align: center; margin-top: 16px; font-size: 13px; color: var(--text-muted); }
.auth-switch a { color: var(--blue); font-weight: 600; cursor: pointer; text-decoration: none; }

/* ── Sync indicator ── */
#syncDot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #16a34a; flex-shrink: 0;
  transition: background .3s;
  margin-left: 4px;
}
#syncDot.syncing { background: var(--amber); animation: pulse .8s infinite; }
#syncDot.error   { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>

<script>
const DEFAULT_CATEGORIES = [
  { id: 'rumah',    name: 'Alokasi Rumah',   lucide: 'home',            color: '#0d9488', bg: '#ccfbf1', budget: 1125000 },
  { id: 'makan',   name: 'Makan & Grocery', lucide: 'shopping-basket', color: '#7c6fff', bg: '#ede9fe', budget: 700000  },
  { id: 'cicilan', name: 'Cicilan',          lucide: 'credit-card',     color: '#2563eb', bg: '#dbeafe', budget: 0       },
  { id: 'buffer',  name: 'Buffer',           lucide: 'shield',          color: '#9ca3af', bg: '#f3f4f6', budget: 175000  },
  { id: 'lainnya', name: 'Lainnya',          lucide: 'package',         color: '#6b7280', bg: '#f3f4f6', budget: 0       },
];

// Icon + color palette for category picker
const CAT_ICONS = [
  { lucide:'home', label:'Rumah' },
  { lucide:'shopping-basket', label:'Belanja' },
  { lucide:'credit-card', label:'Cicilan' },
  { lucide:'shield', label:'Buffer' },
  { lucide:'utensils', label:'Makan' },
  { lucide:'car', label:'Transport' },
  { lucide:'heart-pulse', label:'Kesehatan' },
  { lucide:'graduation-cap', label:'Pendidikan' },
  { lucide:'smartphone', label:'Gadget' },
  { lucide:'wifi', label:'Internet' },
  { lucide:'zap', label:'Listrik' },
  { lucide:'baby', label:'Anak' },
  { lucide:'plane', label:'Liburan' },
  { lucide:'dumbbell', label:'Olahraga' },
  { lucide:'shirt', label:'Pakaian' },
  { lucide:'gift', label:'Hadiah' },
  { lucide:'coffee', label:'Kopi' },
  { lucide:'tv', label:'Hiburan' },
  { lucide:'briefcase', label:'Bisnis' },
  { lucide:'package', label:'Lainnya' },
];
const CAT_COLORS = [
  { color:'#0d9488', bg:'#ccfbf1' },
  { color:'#7c6fff', bg:'#ede9fe' },
  { color:'#2563eb', bg:'#dbeafe' },
  { color:'#9ca3af', bg:'#f3f4f6' },
  { color:'#d97706', bg:'#fef3c7' },
  { color:'#dc2626', bg:'#fee2e2' },
  { color:'#db2777', bg:'#fce7f3' },
  { color:'#059669', bg:'#dcfce7' },
  { color:'#ea580c', bg:'#ffedd5' },
  { color:'#6366f1', bg:'#e0e7ff' },
];

// Live category list — loads from storage, merges with defaults
let CATEGORIES = [];
function getDeletedDefaults(){ try{return JSON.parse(localStorage.getItem('emir_deleted_defaults')||'[]')}catch{return[]} }
function markDefaultDeleted(id){ const a=getDeletedDefaults(); if(!a.includes(id)){a.push(id);localStorage.setItem('emir_deleted_defaults',JSON.stringify(a));} }

function loadCategories(){
  try {
    const saved = JSON.parse(localStorage.getItem('emir_categories') || 'null');
    if(!saved){ CATEGORIES = [{ id:'lainnya', name:'Lainnya', lucide:'package', color:'#6b7280', bg:'#f3f4f6', budget:0 }]; return; }
    const merged = [...saved];
    // Auto-migrate: categories with saving-like names get type:'saving' if not set
    const savingKeywords = ['tabungan','dana darurat','investasi','saving'];
    let migrated = false;
    merged.forEach(c => {
      if(!c.type && savingKeywords.some(k => c.name.toLowerCase().includes(k))){
        c.type = 'saving'; migrated = true;
      }
    });
    CATEGORIES = merged;
    if(migrated) saveCategories();
  } catch { CATEGORIES = JSON.parse(JSON.stringify(DEFAULT_CATEGORIES)); }
}
function saveCategories(){
  localStorage.setItem('emir_categories', JSON.stringify(CATEGORIES));
}
loadCategories();

const MONTHS_ID    = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

// ── Storage ──────────────────────────────────────────────────────
const DB = {
  _txKey:'emir_tx', _mKey:'emir_months',
  getTx(){ try{return JSON.parse(localStorage.getItem(this._txKey)||'[]')}catch{return[]} },
  saveTx(a){ localStorage.setItem(this._txKey,JSON.stringify(a)) },
  addTx(t){ const a=this.getTx(); a.push({...t,id:Date.now()+Math.random().toString(36).slice(2)}); this.saveTx(a) },
  deleteTx(id){ this.saveTx(this.getTx().filter(t=>t.id!==id)) },
  getTxForMonth(m){ return this.getTx().filter(t=>t.date.startsWith(m)) },
  getMonth(m){ try{return(JSON.parse(localStorage.getItem(this._mKey)||'{}'))[m]||null}catch{return null} },
  saveMonth(m,d){ try{const a=JSON.parse(localStorage.getItem(this._mKey)||'{}');a[m]=d;localStorage.setItem(this._mKey,JSON.stringify(a))}catch{} },
  getTemplates(){ try{return JSON.parse(localStorage.getItem('emir_templates')||'[]')}catch{return[]} },
  saveTemplates(a){ localStorage.setItem('emir_templates',JSON.stringify(a)) },
  // ── Multi-income ──
  getIncomes(m){
    const md = this.getMonth(m);
    if(md?.incomes?.length) return md.incomes;
    // migrate legacy single-income format
    let allocations = md?.allocations||{};
    // no fallback to cat.budget — start empty for new users
    return [{id:'main', label:'Gaji', amount: md?.income||0, allocations}];
  },
  saveIncomes(m, incomes){
    const md = this.getMonth(m)||{};
    // keep legacy fields in sync so overview tab keeps working
    const income = incomes.reduce((s,e)=>s+(e.amount||0),0);
    const allocations = {};
    incomes.forEach(e=>{
      Object.entries(e.allocations||{}).forEach(([k,v])=>{ allocations[k]=(allocations[k]||0)+(v||0); });
    });
    this.saveMonth(m, {...md, incomes, income, allocations});
  },
};

// ── State ────────────────────────────────────────────────────────
const State = {
  tab:'overview',
  view:'personal', // 'personal' | 'keluarga'
  allocMode:'custom',
  activeIncomeId: null,
  month:(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`})(),
};

// ── Helpers ──────────────────────────────────────────────────────
function viewToggleHTML(){
  const isK = State.view==='keluarga';
  return `<div class="view-toggle">
    <button class="view-toggle-btn${!isK?' active-personal':''}" onclick="App.switchView('personal')">
      ${icon('user',13,'currentColor')} Personal
    </button>
    <button class="view-toggle-btn${isK?' active-keluarga':''}" onclick="App.switchView('keluarga')">
      ${icon('house-heart',13,'currentColor')} Keluarga
    </button>
  </div>`;
}

function fmtRp(n){
  if(!n&&n!==0)return'—';
  return'Rp '+Math.abs(n).toLocaleString('id-ID');
}
function fmtFull(n){ return'Rp '+Math.abs(n).toLocaleString('id-ID') }
function mLabel(s){ const[y,m]=s.split('-'); return`${MONTHS_SHORT[+m-1]} ${y}` }
function mFull(s){ const[y,m]=s.split('-'); return`${MONTHS_ID[+m-1]} ${y}` }
function prevM(s){ const[y,m]=s.split('-').map(Number),d=new Date(y,m-2,1); return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` }
function nextM(s){ const[y,m]=s.split('-').map(Number),d=new Date(y,m,1); return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` }
function fmtDate(s){ const d=new Date(s+'T00:00:00'); return`${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}` }
function catById(id){ return CATEGORIES.find(c=>c.id===id)||CATEGORIES[4] }
function getBudget(cat,md){ return md?.allocations?.[cat.id]??cat.budget }
function spent(txs,id){ return txs.filter(t=>t.category===id).reduce((s,t)=>s+t.amount,0) }
function today(){ const d=new Date(); return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` }
function icon(name,size=18,color='currentColor'){
  return`<i data-lucide="${name}" width="${size}" height="${size}" style="color:${color}"></i>`;
}
function catBox(cat,size=40,iconSize=18){
  return`<div class="cat-box" style="background:${cat.bg};width:${size}px;height:${size}px;">${icon(cat.lucide,iconSize,cat.color)}</div>`;
}
function reicons(){ if(window.lucide)lucide.createIcons() }

let _famAllocChart = null;
function initFamAllocChart(){
  const canvas = document.getElementById('famAllocChart');
  if(!canvas) return;
  if(_famAllocChart){ _famAllocChart.destroy(); _famAllocChart=null; }
  const cats = FamilyDB.getCategories();
  const allocs = FamilyDB.getAllocations(State.month);
  const values = cats.map(c=>allocs[c.id]||0);
  const hasData = values.some(v=>v>0);
  const total = values.reduce((a,b)=>a+b,0);
  _famAllocChart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: cats.map(c=>c.name),
      datasets:[{
        data: hasData ? values : [1],
        backgroundColor: hasData ? cats.map(c=>c.color) : ['#e5e7eb'],
        borderWidth: 3,
        borderColor: '#ffffff',
        hoverBorderWidth: 3,
        hoverOffset: 4,
      }]
    },
    options:{
      cutout: '68%',
      responsive: true,
      maintainAspectRatio: false,
      plugins:{
        legend:{ display:false },
        tooltip:{
          enabled: hasData,
          callbacks:{
            label: ctx => ` ${fmtRp(ctx.raw)}  (${Math.round(ctx.raw/values.reduce((a,b)=>a+b,0)*100)}%)`
          },
          backgroundColor:'#1f2937',
          padding:10,
          cornerRadius:8,
          titleFont:{ family:'Inter', size:12 },
          bodyFont:{ family:'JetBrains Mono', size:13 },
        }
      },
      animation:{ duration: 400, easing:'easeInOutQuart' }
    }
  });
  const center = document.getElementById('famChartCenter');
  if(center) center.querySelector('div:last-child').textContent = fmtRp(total);
}
function updateFamAllocChart(){
  if(!_famAllocChart) return;
  const cats = FamilyDB.getCategories();
  const values = cats.map(c=>{
    const f = document.querySelector(`.alloc-field[data-famcat="${c.id}"]`);
    return parseInt(f?.value||0)||0;
  });
  const total = values.reduce((a,b)=>a+b,0);
  const hasData = values.some(v=>v>0);
  _famAllocChart.data.labels = cats.map(c=>c.name);
  _famAllocChart.data.datasets[0].data = hasData ? values : [1];
  _famAllocChart.data.datasets[0].backgroundColor = hasData ? cats.map(c=>c.color) : ['#e5e7eb'];
  _famAllocChart.options.plugins.tooltip.enabled = hasData;
  _famAllocChart.update('active');
  const center = document.getElementById('famChartCenter');
  if(center) center.querySelector('div:last-child').textContent = fmtRp(total);
  // sync legend dots
  cats.forEach(c=>{
    const dot = document.querySelector(`.fam-legend-dot[data-cat="${c.id}"]`);
    if(dot) dot.parentElement.style.display = values[cats.indexOf(c)]>0?'flex':'none';
  });
}

let _allocChart = null;
function initAllocChart(){
  const canvas = document.getElementById('allocChart');
  if(!canvas) return;
  if(_allocChart){ _allocChart.destroy(); _allocChart=null; }
  const cats = CATEGORIES.filter(c=>c.id!=='lainnya');
  // use merged allocations from all income sources
  const incomes = DB.getIncomes(State.month);
  const mergedAlloc = {};
  incomes.forEach(e=>{ Object.entries(e.allocations||{}).forEach(([k,v])=>{ mergedAlloc[k]=(mergedAlloc[k]||0)+(v||0); }); });
  const values = cats.map(c=>mergedAlloc[c.id]||0);
  const hasData = values.some(v=>v>0);
  _allocChart = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels: cats.map(c=>c.name),
      datasets:[{
        data: hasData ? values : [1],
        backgroundColor: hasData ? cats.map(c=>c.color) : ['#e5e7eb'],
        borderWidth: 3,
        borderColor: '#ffffff',
        hoverBorderWidth: 3,
        hoverOffset: 4,
      }]
    },
    options:{
      cutout: '68%',
      responsive: true,
      maintainAspectRatio: false,
      plugins:{
        legend:{ display:false },
        tooltip:{
          enabled: hasData,
          callbacks:{
            label: ctx => ` ${fmtRp(ctx.raw)}  (${Math.round(ctx.raw/values.reduce((a,b)=>a+b,0)*100)}%)`
          },
          backgroundColor:'#1f2937',
          padding:10,
          cornerRadius:8,
          titleFont:{ family:'Inter', size:12 },
          bodyFont:{ family:'JetBrains Mono', size:13 },
        }
      },
      animation:{ duration: 400, easing:'easeInOutQuart' }
    }
  });
}

function updateAllocChart(){
  if(!_allocChart) return;
  const cats = CATEGORIES.filter(c=>c.id!=='lainnya');
  const values = cats.map(c=>{
    const f = document.querySelector(`.alloc-field[data-cat="${c.id}"]`);
    return parseInt(f?.value||0)||0;
  });
  _allocChart.data.labels = cats.map(c=>c.name);
  const total = values.reduce((a,b)=>a+b,0);
  const hasData = values.some(v=>v>0);
  _allocChart.data.datasets[0].data = hasData ? values : [1];
  _allocChart.data.datasets[0].backgroundColor = hasData ? cats.map(c=>c.color) : ['#e5e7eb'];
  _allocChart.options.plugins.tooltip.enabled = hasData;
  _allocChart.update('active');
  // update center label
  const center = document.getElementById('chartCenter');
  if(center){
    center.querySelector('div:last-child').textContent = fmtRp(total);
  }
}

// ── App ──────────────────────────────────────────────────────────
const App = {
  init(){
    loadCategories(); // reload after Supabase data is in localStorage
    document.getElementById('monthLabel').textContent=mLabel(State.month);
    document.getElementById('prevMonth').onclick=()=>this.changeMonth(-1);
    document.getElementById('nextMonth').onclick=()=>this.changeMonth(1);
    this.render();
  },
  changeMonth(dir){
    State.month=dir<0?prevM(State.month):nextM(State.month);
    document.getElementById('monthLabel').textContent=mLabel(State.month);
    this.render();
  },
  _updateFab(){
    const fab = document.getElementById('fab');
    const hasFab = State.tab==='overview' || State.tab==='transaksi';
    fab.style.display = hasFab ? 'flex' : 'none';
    document.getElementById('appMain').style.paddingBottom = hasFab ? 'calc(var(--nav-h) + 72px)' : '20px';
    if(hasFab){
      fab.onclick = State.view==='keluarga' ? ()=>FamilyApp.openAddTx() : ()=>Modal.openAdd();
    }
  },
  switchTab(tab,btn){
    State.tab=tab;
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    this._updateFab();
    this.render();
  },
  switchView(v){
    State.view=v;
    this._updateFab();
    this.render();
  },
  render(){
    try {
      const txs=DB.getTxForMonth(State.month), md=DB.getMonth(State.month);
      const main=document.getElementById('appMain');
      if(!main){ console.error('appMain not found'); return; }
      if(State.tab==='overview') main.innerHTML=Render.overview(txs,md);
      else if(State.tab==='transaksi') main.innerHTML=Render.transaksi(txs,md);
      else if(State.tab==='tabungan') main.innerHTML=Render.tabungan();
      else if(State.tab==='keluarga'){
        main.innerHTML=FamilyApp.renderAlokasi();
      }
      else main.innerHTML=Render.pemasukan(md);
      reicons();
      if(State.tab==='pemasukan'){
        requestAnimationFrame(initAllocChart);
        this._attachSwipe();
      }
      if(State.tab==='keluarga'){
        requestAnimationFrame(initFamAllocChart);
      }
    } catch(e){
      console.error('render() error:', e);
      const main=document.getElementById('appMain');
      if(main) main.innerHTML=`<div style="padding:20px;color:red;font-size:13px;">Render error: ${e.message}<br><pre style="font-size:11px;overflow:auto">${e.stack}</pre></div>`;
    }
  },
  _attachSwipe(){}, // replaced by native scroll snap on .income-hero-track
  deleteTx(id){
    if(!confirm('Hapus transaksi ini?'))return;
    DB.deleteTx(id); this.render();
  },
  savePemasukan(){
    const allocations={};
    document.querySelectorAll('.alloc-field').forEach(f=>{ allocations[f.dataset.cat]=parseInt(f.value||'0') });
    const md=DB.getMonth(State.month)||{};
    DB.saveMonth(State.month,{...md,allocations});
    const btn=document.querySelector('.save-alloc-btn');
    if(btn){btn.textContent='Tersimpan ✓'; btn.style.background='#16a34a';}
    setTimeout(()=>this.render(),900);
  },
  deleteCategory(id){
    loadCategories();
    if(CATEGORIES.length<=1){alert('Minimal satu kategori.');return;}
    if(!confirm('Hapus kategori ini?'))return;
    // if it's a default category, remember the deletion so loadCategories won't restore it
    if(DEFAULT_CATEGORIES.find(d=>d.id===id)) markDefaultDeleted(id);
    CATEGORIES = CATEGORIES.filter(c=>c.id!==id);
    saveCategories(); this.render();
  },
  editCategory(id, data){
    loadCategories();
    const idx = CATEGORIES.findIndex(c=>c.id===id);
    if(idx<0)return;
    const merged = { ...CATEGORIES[idx], ...data };
    if(data.type === undefined) delete merged.type;
    CATEGORIES[idx] = merged;
    saveCategories(); Modal.close(); this.render();
  },
  addCategory(data){
    loadCategories(); // reload from storage so we don't overwrite concurrently added categories
    const id = 'cat_'+Date.now();
    const idx = CATEGORIES.findIndex(c=>c.id==='lainnya');
    const newCat = { id, ...data, budget: 0 };
    if(idx>=0) CATEGORIES.splice(idx,0,newCat);
    else CATEGORIES.push(newCat);
    saveCategories(); Modal.close(); this.render();
  },
  setAllocMode(mode){
    State.allocMode=mode; this.render();
    if(mode==='pemasukan') requestAnimationFrame(initAllocChart);
  },
  applyTemplate(idx){
    const tpl=DB.getTemplates()[idx]; if(!tpl)return;
    const md=DB.getMonth(State.month)||{};
    DB.saveMonth(State.month,{...md,income:md.income||0,allocations:tpl.allocations});
    State.allocMode='custom'; this.render();
  },
  deleteTemplate(idx){
    if(!confirm('Hapus template ini?'))return;
    const tpls=DB.getTemplates(); tpls.splice(idx,1); DB.saveTemplates(tpls); this.render();
  },
  saveTemplateFromCurrent(name){
    const allocations={};
    document.querySelectorAll('.alloc-field').forEach(f=>{ allocations[f.dataset.cat]=parseInt(f.value||'0') });
    const tpls=DB.getTemplates(); tpls.push({name,allocations}); DB.saveTemplates(tpls);
    Modal.close(); this.render();
  },
  selectIncome(id, idx){
    State.activeIncomeId = id;
    // Scroll carousel to card
    const track = document.getElementById('heroTrack');
    if(track){
      const card = track.querySelector(`.income-hero[data-id="${id}"]`);
      if(card) card.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'start' });
    }
    // Update alloc rows without full re-render
    this._refreshAllocRows();
    if(State.tab==='pemasukan') requestAnimationFrame(initAllocChart);
    // Update dots
    document.querySelectorAll('.income-dot').forEach(d=>{ d.classList.remove('active'); d.style.background=''; d.style.width=''; });
    const dot = document.getElementById('heroDot_'+id);
    if(dot){ dot.classList.add('active'); dot.style.background = idx===0?'#2563eb':idx===1?'#7c3aed':'#059669'; }
  },
  _onHeroScroll(track){
    // Detect which card is snapped and update active state + dots
    const cards = track.querySelectorAll('.income-hero');
    let closest = null, minDist = Infinity;
    cards.forEach(card=>{
      const dist = Math.abs(card.getBoundingClientRect().left - track.getBoundingClientRect().left);
      if(dist < minDist){ minDist = dist; closest = card; }
    });
    if(!closest) return;
    const id = closest.dataset.id;
    const idx = parseInt(closest.dataset.idx);
    if(id !== State.activeIncomeId){
      State.activeIncomeId = id;
      document.querySelectorAll('.income-dot').forEach(d=>{ d.classList.remove('active'); d.style.background=''; d.style.width='6px'; });
      const dot = document.getElementById('heroDot_'+id);
      if(dot){ dot.classList.add('active'); dot.style.background = idx===0?'#2563eb':idx===1?'#7c3aed':'#059669'; dot.style.width='18px'; }
      this._refreshAllocRows();
    }
  },
  _refreshAllocRows(){
    // Update alloc field values and section title for active income
    const m = State.month;
    const incomes = DB.getIncomes(m);
    const inc = incomes.find(e=>e.id===State.activeIncomeId)||incomes[0];
    if(!inc) return;
    const alloc = inc.allocations||{};
    document.querySelectorAll('.alloc-field[data-cat]').forEach(f=>{
      const v = alloc[f.dataset.cat]||0;
      f.value = v||'';
    });
    const title = document.querySelector('.alloc-active-title');
    if(title) title.textContent = `Alokasi · ${inc.label}`;
    updateAllocChart();
  },
  // ── Multi-income ──
  addIncome(label, amount, payDay=1){
    const incomes = DB.getIncomes(State.month);
    if(incomes.length >= 2){ alert('Maksimal 2 sumber pemasukan.'); return; }
    const id = 'inc_'+Date.now();
    incomes.push({id, label, amount, payDay, allocations:{}});
    DB.saveIncomes(State.month, incomes);
    State.activeIncomeId = id;
    Modal.close();
    this.render();
    if(State.tab==='pemasukan') requestAnimationFrame(initAllocChart);
  },
  deleteIncome(id){
    const incomes = DB.getIncomes(State.month);
    if(incomes.length<=1){ alert('Minimal satu sumber pemasukan.'); return; }
    if(!confirm('Hapus sumber pemasukan ini?')) return;
    DB.saveIncomes(State.month, incomes.filter(e=>e.id!==id));
    this.render();
  },
  editIncome(id, label, amount, payDay=1){
    const incomes = DB.getIncomes(State.month);
    const idx = incomes.findIndex(e=>e.id===id);
    if(idx<0) return;
    incomes[idx] = {...incomes[idx], label, amount, payDay};
    DB.saveIncomes(State.month, incomes);
    Modal.close(); this.render();
  },
  saveIncomeAllocations(id){
    const incomes = DB.getIncomes(State.month);
    const idx = incomes.findIndex(e=>e.id===id);
    if(idx<0) return;
    const allocations={};
    document.querySelectorAll('.alloc-field').forEach(f=>{ allocations[f.dataset.cat]=parseInt(f.value||'0')||0; });
    incomes[idx].allocations = allocations;
    DB.saveIncomes(State.month, incomes);
    const btn=document.querySelector('.save-alloc-btn');
    if(btn){btn.textContent='Tersimpan ✓';btn.style.background='#16a34a';}
    setTimeout(()=>{ this.render(); if(State.tab==='pemasukan') requestAnimationFrame(initAllocChart); },900);
  },
  removeAllocRow(incomeId, catId){
    const incomes = DB.getIncomes(State.month);
    const inc = incomes.find(e=>e.id===incomeId);
    if(!inc) return;
    delete inc.allocations[catId];
    DB.saveIncomes(State.month, incomes);
    this.render(); if(State.tab==='pemasukan') requestAnimationFrame(initAllocChart);
  },
  applyTemplateToIncome(id, tplIdx){
    const tpl = DB.getTemplates()[tplIdx]; if(!tpl) return;
    const incomes = DB.getIncomes(State.month);
    const idx = incomes.findIndex(e=>e.id===id);
    if(idx<0) return;
    incomes[idx].allocations = {...tpl.allocations};
    DB.saveIncomes(State.month, incomes);
    State.activeIncomeId = id;
    Modal.close(); this.render();
    if(State.tab==='pemasukan') requestAnimationFrame(initAllocChart);
  },
};

// ── Render ───────────────────────────────────────────────────────
const Render = {
  overview(txs,md){
    if(State.view==='keluarga') return viewToggleHTML() + FamilyApp.renderRingkasan();
    let h = viewToggleHTML();
    const income=md?.income||0;
    const savingCatIds=new Set(CATEGORIES.filter(c=>c.type==='saving').map(c=>c.id));
    const spendTxs=txs.filter(t=>!savingCatIds.has(t.category));
    const savingTxs=txs.filter(t=>savingCatIds.has(t.category));
    const totalSpent=spendTxs.reduce((s,t)=>s+t.amount,0);
    const totalSaved=savingTxs.reduce((s,t)=>s+t.amount,0);
    const totalBudget=CATEGORIES.filter(c=>c.type!=='saving').reduce((s,c)=>s+getBudget(c,md),0);
    // alokasi ke tabungan bulan ini (dari income sources)
    const incomesSrc=DB.getIncomes(State.month);
    const totalAllocSaving=incomesSrc.filter(inc=>{ const pd=(State.month+'-'+String(inc.payDay||1).padStart(2,'0')); return pd<=today(); }).reduce((s,inc)=>s+Object.entries(inc.allocations||{}).filter(([k])=>savingCatIds.has(k)).reduce((ss,[,v])=>ss+(v||0),0),0);
    const sisa=income?income-totalSpent-totalAllocSaving:totalBudget-totalSpent;
    const totalUsed=totalSpent+totalAllocSaving;
    const pct=income>0?Math.min(totalUsed/income*100,100):totalBudget>0?Math.min(totalSpent/totalBudget*100,100):0;
    const sisaColor=sisa<0?'#fca5a5':sisa<(income||totalBudget)*.15?'#fde68a':'#ffffff';

    h+=`
    <div class="hero-card">
      <div class="hero-label">Sisa Budget</div>
      <div class="hero-value" style="color:${sisaColor}">${fmtRp(Math.abs(sisa))}${sisa<0?' −':''}</div>
      <div class="hero-sub">${sisa<0?'Melebihi budget':income?'dari pemasukan':'dari total budget'} · ${mFull(State.month)}</div>
      <div class="hero-progress"><div class="hero-progress-fill" style="width:${pct}%"></div></div>
      <div class="hero-stats">
        <div class="hero-stat">
          <div class="hs-label">Pengeluaran</div>
          <div class="hs-val">${fmtRp(totalSpent)}</div>
        </div>
        ${totalAllocSaving?`<div class="hero-stat">
          <div class="hs-label">Tabungan</div>
          <div class="hs-val" style="color:#86efac;">${fmtRp(totalAllocSaving)}</div>
        </div>`:`<div class="hero-stat">
          <div class="hs-label">${income?'Pemasukan':'Budget'}</div>
          <div class="hs-val">${fmtRp(income||totalBudget)}</div>
        </div>`}
      </div>
    </div>`;

    // Budget section — flat, no stacked card (exclude saving cats)
    const budgetCats = CATEGORIES.filter(cat=>cat.type!=='saving').filter(cat=>{ const b=getBudget(cat,md),s=spent(spendTxs,cat.id); return b>0||s>0; });
    if(budgetCats.length){
      h+=`<div class="section-flat">
        <div class="section-header">
          <span class="card-title">Budget vs Aktual</span>
        </div>
        <div style="padding:0 18px 16px;">`;
      budgetCats.forEach(cat=>{
        const b=getBudget(cat,md), s=spent(spendTxs,cat.id);
        const pct=b>0?Math.min(s/b*100,100):0, over=s>b&&b>0;
        h+=`<div class="budget-row">
          <div class="budget-top">
            ${catBox(cat,38,16)}
            <div class="budget-info">
              <div class="budget-name">${cat.name}</div>
              <div class="budget-nums ${over?'over-text':''}">
                <span class="spent">${fmtFull(s)}</span>&nbsp;<span style="color:var(--text-faint)">/</span>&nbsp;${fmtRp(b)}
              </div>
            </div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:${over?'var(--red)':'var(--text-muted)'};">${b>0?Math.round(s/b*100):0}%</div>
          </div>
          <div class="budget-track">
            <div class="budget-fill" style="width:${pct}%;background:${over?'var(--red)':cat.color}"></div>
          </div>
        </div>`;
      });
      h+=`</div></div>`;

    // Recent transactions — flat

      <div class="section-header">

      h+=`<div style="text-align:center;padding:20px 0 20px;color:var(--text-faint);font-size:13px;">Belum ada transaksi bulan ini</div>`;
    } else {
      recent.forEach(tx=>{ h+=this._txRow(tx); });
    }
    h+=`</div></div>`;
    return h;
  },

  transaksi(txs,md){
    if(State.view==='keluarga') return viewToggleHTML() + FamilyApp.renderTransaksi();
    const savingCatIds=new Set(CATEGORIES.filter(c=>c.type==='saving').map(c=>c.id));
    const totalSpent=txs.filter(t=>!savingCatIds.has(t.category)).reduce((s,t)=>s+t.amount,0);
    const totalSaved=txs.filter(t=>savingCatIds.has(t.category)).reduce((s,t)=>s+t.amount,0);

                style="background:rgba(255,255,255,.15);border:none;border-radius:8px;padding:5px 10px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:4px;">

    });

    h+=`<button class="add-cat-btn" onclick="Modal.openAddAllocRow('${activeId}')">

      </button>

  _liveAllocTotal(incomeAmount){
    let total=0;

    const el=document.getElementById('allocTotal');

    el.textContent=fmtRp(total);
    const diff=incomeAmount-total;
    el.className='alloc-total-val '+(diff<0?'over-budget':diff===0&&total>0?'':'');
  },

  _txRow(tx, inGroup=false){
    const cat=catById(tx.category);
    const isSaving=cat.type==='saving';
    return`<div class="tx-row">
      ${catBox(cat,40,16)}
      <div class="tx-info">
        <div class="tx-note">${tx.note||cat.name}${isSaving?` <span style="font-size:10px;font-weight:700;color:#16a34a;background:#dcfce7;border-radius:99px;padding:1px 7px;vertical-align:middle;">Tabungan</span>`:''}</div>
        <div class="tx-meta">${inGroup?cat.name:fmtDate(tx.date)+' · '+cat.name}</div>
      </div>
      <div class="tx-amount" style="${isSaving?'color:#16a34a':''}">${fmtFull(tx.amount)}</div>
      <button class="tx-del" onclick="App.deleteTx('${tx.id}')">${icon('trash-2',14,'currentColor')}</button>
    </div>`;
  },

  tabungan(){
    if(State.view==='keluarga') return viewToggleHTML() + FamilyApp.renderTabungan();
    const toggle = viewToggleHTML();
    const savingCats = CATEGORIES.filter(c => c.type === 'saving');
    if(!savingCats.length){
      return toggle + `<div class="empty">
        ${icon('piggy-bank',40,'var(--text-faint)')}
        <div class="empty-label">Belum ada kategori tabungan</div>
        <div class="empty-sub">Tandai kategori sebagai "Tabungan/Investasi" saat membuat kategori baru.</div>
      </div>`;
    }

    // Build pocket data from all months
    const allMonthsData = (() => { try { return JSON.parse(localStorage.getItem('emir_months')||'{}'); } catch { return {}; } })();
    const allMonths = Object.keys(allMonthsData).sort();

    let h = toggle;
    savingCats.forEach(cat => {
      let totalIn = 0, totalOut = 0;
      const history = [];

      allMonths.forEach(m => {
        // Top-ups: allocations from each income source (only if payDay has passed)
        const incomes = DB.getIncomes(m);
        incomes.forEach(inc => {
          const payDay = inc.payDay || 1;
          const payDate = m + '-' + String(payDay).padStart(2,'0');
          if(payDate > today()) return; // not realized yet
          const alloc = (inc.allocations||{})[cat.id] || 0;
          if(alloc > 0){
            totalIn += alloc;
            history.push({ date: payDate, label: `Alokasi · ${inc.label}`, amount: alloc, type: 'in' });
          }
        });
        // Withdrawals: transactions in this category
        const txs = DB.getTxForMonth(m).filter(t=>t.category===cat.id);
        txs.forEach(tx => {
          totalOut += tx.amount;
          history.push({ date: tx.date, label: tx.note||'Penarikan', amount: tx.amount, type: 'out' });
        });
      });

      const balance = totalIn - totalOut;
      history.sort((a,b)=>b.date.localeCompare(a.date));
      const recent = history.slice(0,5);

      h += `<div class="pocket-card">
        <div class="pocket-header">
          <div class="pocket-icon" style="background:${cat.bg};">${icon(cat.lucide,20,cat.color)}</div>
          <div>
            <div class="pocket-name">${cat.name}</div>
            <div class="pocket-sub">Saldo berjalan</div>
          </div>
        </div>
        <div class="pocket-balance" style="color:${balance<0?'var(--red)':cat.color}">${fmtRp(Math.abs(balance))}${balance<0?' <span style="font-size:14px;font-weight:600;color:var(--red)">defisit</span>':''}</div>
        <div class="pocket-stats">
          <div class="pocket-stat">
            <div class="pocket-stat-label">Total Masuk</div>
            <div class="pocket-stat-val" style="color:#16a34a;">${fmtRp(totalIn)}</div>
          </div>
          <div class="pocket-stat">
            <div class="pocket-stat-label">Total Keluar</div>
            <div class="pocket-stat-val" style="color:var(--red);">${fmtRp(totalOut)}</div>
          </div>
        </div>
        ${recent.length?`<div style="margin-top:16px;">
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:8px;">Riwayat</div>
          ${recent.map(h=>`<div class="pocket-history-row">
            <div class="pocket-hist-dot" style="background:${h.type==='in'?'#16a34a':'var(--red)'}"></div>
            <div class="pocket-hist-info">
              <div class="pocket-hist-label">${h.label}</div>
              <div class="pocket-hist-date">${fmtDate(h.date)}</div>
            </div>
            <div class="pocket-hist-amt" style="color:${h.type==='in'?'#16a34a':'var(--red)'}">
              ${h.type==='in'?'+':'−'}${fmtRp(h.amount)}
            </div>
          </div>`).join('')}
        </div>`:''}
      </div>`;
    });

    return h;
  },
};
